name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK 
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java (for Android SDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install dependencies
        working-directory: ./synapse-mobile
        run: npm install

      - name: Build APK locally via EAS
        working-directory: ./synapse-mobile
        # The EXPO_NO_TELEMETRY prevents prompts. 
        # --local tells EAS to build right on the Github Runner instead of queuing in Expo cloud.
        run: EXPO_NO_TELEMETRY=1 eas build --platform android --profile preview --local --non-interactive --output app.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: synapse-mobile-apk
          path: synapse-mobile/app.apk
          retention-days: 7
